name: setup-readme

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply EXAMPLE as final README
        id: apply_example
        run: |
          if [ ! -f EXAMPLE.md ]; then
            echo "EXAMPLE.md not found. Setup likely already applied; skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cp EXAMPLE.md README.md
          rm -f EXAMPLE.md
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push setup changes
        if: steps.apply_example.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet README.md EXAMPLE.md; then
            echo "No setup changes detected."
            exit 0
          fi

          git add README.md
          if git ls-files --error-unmatch EXAMPLE.md >/dev/null 2>&1; then
            git add EXAMPLE.md
          fi
          git commit -m "chore(setup): apply example as final readme"
          git push
